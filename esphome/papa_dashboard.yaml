sensor:
  - platform: max17043
    id: battery_gauge
    i2c_id: i2c_battery_gauge
    update_interval: 60s
    battery_voltage:
      name: "${friendly_name} Batterijspanning"
      id: battery_voltage
      accuracy_decimals: 2
    battery_level:
      name: "${friendly_name} Batterij"
      id: battery_level
      accuracy_decimals: 0
      filters:
        - lambda: |-
            if (std::isnan(x)) return x;
            if (x < 0.0f) return 0.0f;
            if (x > 100.0f) return 100.0f;
            return x;
  - platform: template
    name: "${friendly_name} Weather Temp Cache"
    id: weather_temp
    internal: true
    update_interval: never
  - platform: template
    name: "${friendly_name} Living Temp Cache"
    id: living_temp
    internal: true
    update_interval: never
  - platform: template
    name: "${friendly_name} Living Humidity Cache"
    id: living_humidity
    internal: true
    update_interval: never
  - platform: template
    name: "${friendly_name} Power Cache"
    id: power_now
    internal: true
    update_interval: never
  - platform: template
    name: "${friendly_name} Solar Cache"
    id: solar_now
    internal: true
    update_interval: never
  - platform: template
    name: "${friendly_name} Lights Cache"
    id: lights_on
    internal: true
    update_interval: never
  - platform: wifi_signal
    name: "${friendly_name} WiFi"
    update_interval: 5min

text_sensor:
  - platform: template
    name: "${friendly_name} Weather Text Cache"
    id: weather_text
    internal: true
    update_interval: never
  - platform: template
    name: "${friendly_name} Gate State Cache"
    id: gate_state
    internal: true
    update_interval: never

script:
  - id: show_startup_screen_after_boot
    mode: restart
    then:
      - delay: 1s
      - if:
          condition:
            lambda: return id(loading_screen_active) && !id(boot_from_deep_sleep);
          then:
            - script.execute: refresh_display
  - id: refresh_display
    mode: single
    then:
      - logger.log:
          level: INFO
          format: "Display refresh start"
      - component.update: main_display
      - logger.log:
          level: INFO
          format: "Display refresh klaar"
  - id: startup_refresh_and_sleep
    mode: restart
    then:
      - lambda: |-
          id(startup_waiting_for_time) = true;
          id(wifi_setup_screen_active) = false;
      - logger.log:
          level: INFO
          format: "Wifi verbonden: data en tijd ophalen voor slaap"
      - script.execute: fetch_dashboard_data
      - script.wait: fetch_dashboard_data
      - logger.log:
          level: INFO
          format: "Batterijmeter verversen voor finale refresh"
      - component.update: battery_gauge
      - if:
          condition:
            lambda: return std::isnan(id(battery_level).state) || std::isnan(id(battery_voltage).state);
          then:
            - delay: 500ms
            - component.update: battery_gauge
      - if:
          condition:
            lambda: return !id(ntp_time).now().is_valid();
          then:
            - logger.log:
                level: INFO
                format: "Wachten op SNTP tijd voor finale refresh"
            - wait_until:
                condition:
                  lambda: return id(ntp_time).now().is_valid();
                timeout: 30s
      - if:
          condition:
            lambda: return id(ntp_time).now().is_valid();
          then:
            - logger.log:
                level: INFO
                format: "Tijd is binnen, finale refresh voor deep sleep"
            - lambda: |-
                id(startup_waiting_for_time) = false;
                id(loading_screen_active) = false;
            - script.execute: maybe_fetch_fact_of_day
            - script.wait: maybe_fetch_fact_of_day
            - script.execute: refresh_display
            - script.wait: refresh_display
          else:
            - logger.log:
                level: WARN
                format: "Geen geldige tijd ontvangen, finale refresh zonder SNTP"
            - lambda: |-
                id(startup_waiting_for_time) = false;
            - script.execute: refresh_display
            - script.wait: refresh_display
      - delay: 2s
      - deep_sleep.allow: battery_sleep
      - max17043.sleep_mode: battery_gauge
      - deep_sleep.enter:
          id: battery_sleep
          sleep_duration: !lambda |-
            auto now = id(ntp_time).now();
            const uint32_t quarter_seconds = 15 * 60;
            if (!now.is_valid()) {
              ESP_LOGW("main", "Geen geldige tijd voor kwartierslaap, val terug op 15 minuten");
              return quarter_seconds * 1000;
            }
            uint32_t elapsed_in_quarter = (now.minute % 15) * 60 + now.second;
            uint32_t remaining_seconds = quarter_seconds - elapsed_in_quarter;
            if (remaining_seconds == 0) {
              remaining_seconds = quarter_seconds;
            }
            ESP_LOGI("main", "Slaap %u seconden tot volgend kwartier", remaining_seconds);
            return remaining_seconds * 1000;
  - id: cold_boot_to_wifi_help
    mode: restart
    then:
      - delay: 60s
      - if:
          condition:
            lambda: return id(loading_screen_active) && !id(wifi_main).is_connected();
          then:
            - logger.log:
                level: INFO
                format: "Geen wifi na koude boot: toon setup-QR scherm"
            - lambda: |-
                id(loading_screen_active) = false;
                id(wifi_setup_screen_active) = true;
            - script.execute: refresh_display
  - id: wake_to_wifi_help
    mode: restart
    then:
      - delay: 60s
      - if:
          condition:
            lambda: return !id(loading_screen_active) && !id(wifi_main).is_connected() && !id(wifi_setup_screen_active);
          then:
            - logger.log:
                level: INFO
                format: "Geen wifi na wake uit deep sleep: toon setup-QR scherm"
            - lambda: |-
                id(wifi_setup_screen_active) = true;
            - script.execute: refresh_display
  - id: fetch_dashboard_data
    mode: single
    then:
      - lambda: |-
          id(state_cache_loaded) = false;
          id(lights_on).publish_state(0);
      - http_request.get:
          url: ${ha_base_url}/api/states/${entity_state_cache}
          request_headers:
            Authorization: !secret ha_authorization
            Content-Type: application/json
          capture_response: true
          max_response_buffer_size: 8192
          on_response:
            then:
              - if:
                  condition:
                    lambda: return response->status_code == 200;
                  then:
                    - lambda: |-
                        bool parsed = json::parse_json(body, [](JsonObject root) -> bool {
                          if (!root["attributes"]) {
                            return false;
                          }

                          JsonObject attributes = root["attributes"].as<JsonObject>();
                          if (attributes.isNull()) {
                            return false;
                          }

                          if (attributes["weather_text"]) {
                            std::string state = attributes["weather_text"].as<std::string>();
                            if (!state.empty() && state != "unknown" && state != "unavailable") {
                              id(weather_text).publish_state(state);
                            }
                          }

                          if (attributes["weather_temp"]) {
                            id(weather_temp).publish_state(attributes["weather_temp"].as<float>());
                          }
                          if (attributes["living_temp"]) {
                            id(living_temp).publish_state(attributes["living_temp"].as<float>());
                          }
                          if (attributes["living_humidity"]) {
                            id(living_humidity).publish_state(attributes["living_humidity"].as<float>());
                          }
                          if (attributes["power_now"]) {
                            id(power_now).publish_state(attributes["power_now"].as<float>());
                          }
                          if (attributes["solar_now"]) {
                            id(solar_now).publish_state(attributes["solar_now"].as<float>());
                          }
                          if (attributes["lights_on"]) {
                            id(lights_on).publish_state(attributes["lights_on"].as<float>());
                          }
                          if (attributes["gate_open"]) {
                            std::string state = attributes["gate_open"].as<std::string>();
                            if (!state.empty() && state != "unknown" && state != "unavailable") {
                              id(gate_state).publish_state(state);
                            }
                          }

                          id(loading_screen_active) = false;
                          return true;
                        });

                        if (parsed) {
                          id(state_cache_loaded) = true;
                        } else {
                          ESP_LOGW("cache", "Status cache JSON kon niet geparsed worden");
                        }
                  else:
                    - logger.log:
                        level: WARN
                        format: "Status cache request failed: %d"
                        args:
                          - response->status_code
      - if:
          condition:
            lambda: return id(state_cache_loaded);
          then:
            - if:
                condition:
                  lambda: return id(startup_waiting_for_time);
                then:
                  - logger.log:
                      level: INFO
                      format: "Status cache geladen, wacht nog op geldige tijd"
                else:
                  - logger.log:
                      level: INFO
                      format: "Status cache geladen via compacte REST-call"
                  - script.execute: maybe_fetch_fact_of_day
                  - script.wait: maybe_fetch_fact_of_day
                  - script.execute: refresh_display
          else:
            - logger.log:
                level: WARN
                format: "Status cache niet beschikbaar; dashboard niet bijgewerkt"
  - id: maybe_fetch_fact_of_day
    mode: single
    then:
      - if:
          condition:
            lambda: |-
              auto now = id(ntp_time).now();
              if (!now.is_valid()) {
                return false;
              }
              int today_key = now.year * 10000 + now.month * 100 + now.day_of_month;
              if (id(fact_refresh_day_key) == today_key && id(fact_cache_version) == 1 && !id(fact_text_cache).empty()) {
                return false;
              }
              return true;
          then:
            - logger.log:
                level: INFO
                format: "Nieuw feitje van vandaag ophalen"
            - http_request.get:
                url: ${fact_api_url}
                request_headers:
                  Accept: application/json
                capture_response: true
                max_response_buffer_size: 2048
                on_response:
                  then:
                    - if:
                        condition:
                          lambda: return response->status_code == 200;
                        then:
                          - lambda: |-
                              bool parsed = json::parse_json(body, [](JsonObject root) -> bool {
                                if (!root["text"]) {
                                  return false;
                                }
                                std::string text = root["text"].as<std::string>();
                                if (text.empty()) {
                                  return false;
                                }
                                auto replace_all = [](std::string &haystack, const std::string &needle, const std::string &replacement) {
                                  size_t pos = 0;
                                  while ((pos = haystack.find(needle, pos)) != std::string::npos) {
                                    haystack.replace(pos, needle.length(), replacement);
                                    pos += replacement.length();
                                  }
                                };
                                replace_all(text, "\xE2\x80\x9C", "\"");
                                replace_all(text, "\xE2\x80\x9D", "\"");
                                replace_all(text, "\xE2\x80\x98", "'");
                                replace_all(text, "\xE2\x80\x99", "'");
                                replace_all(text, "\xE2\x80\x93", "-");
                                replace_all(text, "\xE2\x80\x94", "-");
                                id(fact_text_cache) = text;
                                auto now = id(ntp_time).now();
                                if (now.is_valid()) {
                                  id(fact_refresh_day_key) = now.year * 10000 + now.month * 100 + now.day_of_month;
                                }
                                id(fact_cache_version) = 1;
                                return true;
                              });
                              if (!parsed) {
                                ESP_LOGW("fact", "Feitje van de dag JSON kon niet geparsed worden");
                              }
                        else:
                          - logger.log:
                              level: WARN
                              format: "Feitje van de dag request failed: %d"
                              args:
                                - response->status_code

button:
  - platform: template
    name: "${friendly_name} Data verversen"
    on_press:
      - if:
          condition:
            wifi.connected:
          then:
            - script.execute: fetch_dashboard_data
          else:
            - script.execute: refresh_display
  - platform: restart
    name: "${friendly_name} Herstart"
  - platform: factory_reset
    name: "${friendly_name} Fabrieksreset"
  - platform: template
    name: "${friendly_name} Slaap nu"
    on_press:
      - deep_sleep.allow: battery_sleep
      - max17043.sleep_mode: battery_gauge
      - deep_sleep.enter:
          id: battery_sleep
          sleep_duration: !lambda |-
            auto now = id(ntp_time).now();
            const uint32_t quarter_seconds = 15 * 60;
            if (!now.is_valid()) {
              ESP_LOGW("main", "Geen geldige tijd voor kwartierslaap, val terug op 15 minuten");
              return quarter_seconds * 1000;
            }
            uint32_t elapsed_in_quarter = (now.minute % 15) * 60 + now.second;
            uint32_t remaining_seconds = quarter_seconds - elapsed_in_quarter;
            if (remaining_seconds == 0) {
              remaining_seconds = quarter_seconds;
            }
            ESP_LOGI("main", "Slaap %u seconden tot volgend kwartier", remaining_seconds);
            return remaining_seconds * 1000;

display:
  - platform: waveshare_epaper
    id: main_display
    model: ${display_model}
    cs_pin: ${pin_cs}
    dc_pin: ${pin_dc}
    reset_pin: ${pin_reset}
    reset_duration: 2ms
    busy_pin:
      number: ${pin_busy}
      inverted: true
    update_interval: never
    rotation: 0
    lambda: |-
      const auto bg = Color(255, 255, 255);
      const auto fg = Color(0, 0, 0);
      const auto line_soft = Color(220, 220, 220);
      const auto line_mid = Color(186, 186, 186);
      const auto muted = Color(132, 132, 132);
      const auto dark_muted = Color(96, 96, 96);

      auto safe_text = [](const std::string &value) -> std::string {
        if (value.empty() || value == "unknown" || value == "unavailable" || value == "None") {
          return "--";
        }
        return value;
      };

      auto weather_label = [&](const std::string &value) -> std::string {
        if (value == "clear-night") return "Heldere nacht";
        if (value == "cloudy") return "Bewolkt";
        if (value == "fog") return "Mist";
        if (value == "hail") return "Hagel";
        if (value == "lightning") return "Onweer";
        if (value == "lightning-rainy") return "Onweer en regen";
        if (value == "partlycloudy") return "Half bewolkt";
        if (value == "pouring") return "Plensregen";
        if (value == "rainy") return "Regen";
        if (value == "snowy") return "Sneeuw";
        if (value == "snowy-rainy") return "Sneeuw en regen";
        if (value == "sunny") return "Zonnig";
        if (value == "windy") return "Winderig";
        if (value == "windy-variant") return "Wisselvallig";
        if (value == "exceptional") return "Onbekend";
        return safe_text(value);
      };

      auto fmt1 = [](float value, const char *suffix) -> std::string {
        if (std::isnan(value)) return std::string("--");
        char buffer[24];
        snprintf(buffer, sizeof(buffer), "%.1f%s", value, suffix);
        return std::string(buffer);
      };

      auto fmt0 = [](float value, const char *suffix) -> std::string {
        if (std::isnan(value)) return std::string("--");
        char buffer[24];
        snprintf(buffer, sizeof(buffer), "%.0f%s", value, suffix);
        return std::string(buffer);
      };

      auto lights_tile_label = [](float value) -> std::string {
        if (std::isnan(value)) return std::string("--");
        int count = static_cast<int>(lroundf(value));
        if (count < 0) count = 0;
        char buffer[24];
        snprintf(buffer, sizeof(buffer), "%d aan", count);
        return std::string(buffer);
      };

      auto gate_label = [](const std::string &value) -> std::string {
        if (value.empty() || value == "unknown" || value == "unavailable") return std::string("--");
        if (value == "on") return std::string("Open");
        if (value == "off") return std::string("Gesloten");
        return std::string("--");
      };

      auto battery_percent = [](float value) -> int {
        if (std::isnan(value)) return -1;
        int rounded = static_cast<int>(lroundf(value));
        if (rounded < 0) return 0;
        if (rounded > 100) return 100;
        return rounded;
      };

      auto wrap_text = [](const std::string &input, size_t max_chars_per_line, size_t max_lines) -> std::vector<std::string> {
        std::vector<std::string> lines;
        std::string clean;
        clean.reserve(input.size());
        bool previous_was_space = false;
        for (char c : input) {
          bool is_space = c == ' ' || c == '\n' || c == '\r' || c == '\t';
          if (is_space) {
            if (!clean.empty() && !previous_was_space) {
              clean.push_back(' ');
            }
            previous_was_space = true;
          } else {
            clean.push_back(c);
            previous_was_space = false;
          }
        }
        while (!clean.empty() && clean.back() == ' ') clean.pop_back();
        if (clean.empty()) {
          lines.push_back("--");
          return lines;
        }

        std::string current;
        size_t start = 0;
        while (start < clean.size() && lines.size() < max_lines) {
          size_t end = clean.find(' ', start);
          std::string word = clean.substr(start, end == std::string::npos ? std::string::npos : end - start);
          if (word.size() > max_chars_per_line) {
            if (!current.empty()) {
              lines.push_back(current);
              current.clear();
              if (lines.size() >= max_lines) break;
            }
            lines.push_back(word.substr(0, max_chars_per_line));
            if (lines.size() >= max_lines) break;
          } else if (current.empty()) {
            current = word;
          } else if (current.size() + 1 + word.size() <= max_chars_per_line) {
            current += " ";
            current += word;
          } else {
            lines.push_back(current);
            current = word;
            if (lines.size() >= max_lines) break;
          }
          if (end == std::string::npos) {
            start = clean.size();
          } else {
            start = end + 1;
          }
        }

        if (!current.empty() && lines.size() < max_lines) {
          lines.push_back(current);
        }

        if (start < clean.size() && !lines.empty()) {
          std::string &last = lines.back();
          if (last.size() > max_chars_per_line - 3) {
            last = last.substr(0, max_chars_per_line - 3);
          }
          last += "...";
        }

        if (lines.empty()) {
          lines.push_back("--");
        }
        return lines;
      };

