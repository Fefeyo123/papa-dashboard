substitutions:
  name: papa-dashboard
  friendly_name: Papa Dashboard
  room_label: BINNEN
  display_model: 7.50inV2p-grayexp
  timezone: Europe/Brussels
  ha_base_url: https://nitramhome.eu
  entity_state_cache: sensor.system_state_cache
  fallback_ap_ssid: Papa Dashboard Setup
  fallback_ap_password: verjaardag123
  fallback_ap_join_qr: WIFI:T:WPA;S:Papa Dashboard Setup;P:verjaardag123;;
  fallback_portal_url: http://192.168.4.1/
  fact_api_url: https://uselessfacts.jsph.pl/api/v2/facts/random?language=en
  font_inclusive_path: fonts/InclusiveSans-Medium.ttf
  font_icons_path: fonts/fa-solid-900.ttf

  pin_clk: GPIO13
  pin_mosi: GPIO14
  pin_cs: GPIO15
  pin_dc: GPIO27
  pin_reset: GPIO26
  pin_busy: GPIO25
  pin_i2c_sda: GPIO21
  pin_i2c_scl: GPIO22

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  project:
    name: papaproject.eink_dashboard
    version: "0.6.0"
  on_boot:
    priority: -10
    then:
      - deep_sleep.prevent: battery_sleep
      - lambda: |-
          auto cause = esp_sleep_get_wakeup_cause();
          id(boot_from_deep_sleep) = cause != ESP_SLEEP_WAKEUP_UNDEFINED;
          id(wifi_setup_screen_active) = false;
          id(loading_screen_active) = !id(boot_from_deep_sleep);
      - if:
          condition:
            lambda: return !id(boot_from_deep_sleep);
          then:
            - script.execute: show_startup_screen_after_boot
            - script.execute: cold_boot_to_wifi_help
          else:
            - script.execute: wake_to_wifi_help

esp32:
  board: esp32dev
  framework:
    type: arduino
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "12"

logger:

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  id: wifi_main
  fast_connect: true
  power_save_mode: light
  reboot_timeout: 0s
  ap:
    ap_timeout: 15s
    ssid: ${fallback_ap_ssid}
    password: ${fallback_ap_password}
  on_connect:
    then:
      - script.execute: startup_refresh_and_sleep

captive_portal:
  compression: gzip

improv_serial:

time:
  - platform: sntp
    id: ntp_time
    timezone: ${timezone}
    on_time:
      - seconds: 0
        minutes: /15
        then:
          - if:
              condition:
                wifi.connected:
              then:
                - logger.log:
                    level: INFO
                    format: "Geplande refresh op kwartier"
                - script.execute: fetch_dashboard_data
              else:
                - logger.log:
                    level: WARN
                    format: "Geplande refresh overgeslagen: geen wifi"

# Hardware helpers
spi:
  clk_pin: ${pin_clk}
  mosi_pin: ${pin_mosi}

i2c:
  id: i2c_battery_gauge
  sda: ${pin_i2c_sda}
  scl: ${pin_i2c_scl}
  scan: true

external_components:
  - source:
      type: local
      path: external_components/grayscale_waveshare/components
    components: [waveshare_epaper]

json:

http_request:
  timeout: 10s
  follow_redirects: true

qr_code:
  - id: setup_wifi_qr
    value: ${fallback_ap_join_qr}
    ecc: QUARTILE
  - id: setup_portal_qr
    value: ${fallback_portal_url}
    ecc: QUARTILE

globals:
  - id: state_cache_loaded
    type: bool
    restore_value: no
    initial_value: "false"
  - id: loading_screen_active
    type: bool
    restore_value: no
    initial_value: "true"
  - id: wifi_setup_screen_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: boot_from_deep_sleep
    type: bool
    restore_value: no
    initial_value: "false"
  - id: startup_waiting_for_time
    type: bool
    restore_value: no
    initial_value: "false"
  - id: fact_refresh_day_key
    type: int
    restore_value: yes
    initial_value: "-1"
  - id: fact_cache_version
    type: int
    restore_value: yes
    initial_value: "0"
  - id: fact_text_cache
    type: std::string
    restore_value: yes
    max_restore_data_length: 192
    initial_value: '"Even nieuw feitje halen..."'

